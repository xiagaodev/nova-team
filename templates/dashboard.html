<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Platform - 智能团队看板</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0f1419;
            --bg-secondary: #1a2332;
            --bg-card: #232f3e;
            --bg-card-hover: #2d3a4d;
            --text-primary: #f7f9fc;
            --text-secondary: #8b9db5;
            --text-muted: #5c6d84;
            --accent-blue: #3b82f6;
            --accent-blue-glow: rgba(59, 130, 246, 0.3);
            --accent-green: #10b981;
            --accent-green-glow: rgba(16, 185, 129, 0.3);
            --accent-amber: #f59e0b;
            --accent-amber-glow: rgba(245, 158, 11, 0.3);
            --accent-red: #ef4444;
            --accent-purple: #8b5cf6;
            --border-color: rgba(139, 157, 181, 0.15);
            --card-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 背景装饰 */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(59, 130, 246, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(139, 92, 246, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(16, 185, 129, 0.04) 0%, transparent 70%);
            z-index: -1;
            animation: bgFloat 20s ease-in-out infinite;
        }

        @keyframes bgFloat {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(2%, 2%) rotate(1deg); }
            66% { transform: translate(-1%, 1%) rotate(-1deg); }
        }

        /* 头部 */
        .header {
            padding: 24px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            background: rgba(15, 20, 25, 0.8);
            backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 4px 20px var(--accent-blue-glow);
        }

        .logo-text {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--text-primary), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-sub {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 400;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .live-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 20px;
            font-size: 12px;
            color: var(--accent-green);
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: var(--accent-green);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        .refresh-btn {
            padding: 8px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .refresh-btn:hover {
            background: var(--bg-card-hover);
            color: var(--text-primary);
            border-color: var(--accent-blue);
        }

        /* 主容器 */
        .main-container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 32px 40px;
        }

        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--card-shadow);
            border-color: var(--accent-blue);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple));
        }

        .stat-card.green::before {
            background: linear-gradient(90deg, var(--accent-green), #06b6d4);
        }

        .stat-card.amber::before {
            background: linear-gradient(90deg, var(--accent-amber), #f97316);
        }

        .stat-card.purple::before {
            background: linear-gradient(90deg, var(--accent-purple), #ec4899);
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 16px;
        }

        .stat-card:nth-child(1) .stat-icon { background: rgba(59, 130, 246, 0.15); }
        .stat-card:nth-child(2) .stat-icon { background: rgba(16, 185, 129, 0.15); }
        .stat-card:nth-child(3) .stat-icon { background: rgba(245, 158, 11, 0.15); }
        .stat-card:nth-child(4) .stat-icon { background: rgba(139, 92, 246, 0.15); }

        .stat-value {
            font-size: 36px;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 13px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-trend {
            position: absolute;
            top: 24px;
            right: 24px;
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 6px;
        }

        .stat-trend.up {
            background: rgba(16, 185, 129, 0.1);
            color: var(--accent-green);
        }

        /* 进度条 */
        .progress-section {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-top: 16px;
        }

        .progress-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .progress-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .progress-dot.pending { background: var(--accent-amber); }
        .progress-dot.in-progress { background: var(--accent-blue); }
        .progress-dot.completed { background: var(--accent-green); }

        .progress-label {
            font-size: 11px;
            color: var(--text-muted);
        }

        .progress-value {
            font-size: 11px;
            color: var(--text-secondary);
            font-family: 'JetBrains Mono', monospace;
            margin-left: auto;
        }

        /* 页面标题 */
        .section-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: linear-gradient(180deg, var(--accent-blue), var(--accent-purple));
            border-radius: 2px;
        }

        /* 项目卡片网格 */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .project-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .project-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--card-shadow);
            border-color: var(--accent-blue);
        }

        .project-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .project-name {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .project-desc {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .project-status {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
        }

        .project-status.planning {
            background: rgba(59, 130, 246, 0.15);
            color: var(--accent-blue);
        }

        .project-status.active {
            background: rgba(16, 185, 129, 0.15);
            color: var(--accent-green);
        }

        .project-status.completed {
            background: rgba(139, 92, 246, 0.15);
            color: var(--accent-purple);
        }

        /* 项目进度条 */
        .project-progress {
            margin: 20px 0;
        }

        .progress-bar {
            height: 8px;
            background: var(--bg-secondary);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-green));
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .progress-percentage {
            font-weight: 600;
            color: var(--accent-green);
        }

        /* 项目统计 */
        .project-stats {
            display: flex;
            gap: 20px;
            padding: 16px 0;
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
            margin: 16px 0;
        }

        .project-stat {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .project-stat-icon {
            font-size: 14px;
        }

        /* 项目成员 */
        .project-members {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .member-label {
            font-size: 12px;
            color: var(--text-muted);
            margin-right: 4px;
        }

        .member-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            margin-left: -8px;
            border: 2px solid var(--bg-card);
        }

        .member-avatar:first-child {
            margin-left: 0;
        }

        .member-avatar.human {
            background: linear-gradient(135deg, var(--accent-blue), #06b6d4);
        }

        .member-avatar.ai {
            background: linear-gradient(135deg, var(--accent-purple), #ec4899);
        }

        /* 任务列表 */
        .todo-section {
            margin-top: 16px;
        }

        .todo-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .todo-count {
            font-size: 12px;
            color: var(--text-muted);
        }

        .todo-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .todo-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            background: var(--bg-secondary);
            border-radius: 8px;
            transition: all 0.2s;
        }

        .todo-item:hover {
            background: var(--bg-card-hover);
        }

        .todo-status {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .todo-status.pending { background: var(--accent-amber); }
        .todo-status.in_progress { background: var(--accent-blue); }
        .todo-status.completed { background: var(--accent-green); }

        .todo-title {
            flex: 1;
            font-size: 13px;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .todo-priority {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 500;
        }

        .todo-priority.high {
            background: rgba(239, 68, 68, 0.15);
            color: var(--accent-red);
        }

        .todo-priority.medium {
            background: rgba(245, 158, 11, 0.15);
            color: var(--accent-amber);
        }

        .todo-priority.low {
            background: rgba(139, 157, 181, 0.15);
            color: var(--text-muted);
        }

        /* 员工卡片 */
        .employees-section {
            margin-top: 40px;
        }

        .employees-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .employee-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            gap: 16px;
            transition: all 0.3s;
        }

        .employee-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--card-shadow);
            border-color: var(--accent-blue);
        }

        .employee-avatar {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }

        .employee-avatar.human {
            background: linear-gradient(135deg, var(--accent-blue), #06b6d4);
        }

        .employee-avatar.ai {
            background: linear-gradient(135deg, var(--accent-purple), #ec4899);
        }

        .employee-info {
            flex: 1;
            min-width: 0;
        }

        .employee-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .employee-role {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .employee-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 500;
        }

        .employee-badge.human {
            background: rgba(59, 130, 246, 0.15);
            color: var(--accent-blue);
        }

        .employee-badge.ai {
            background: rgba(139, 92, 246, 0.15);
            color: var(--accent-purple);
        }

        .employee-stats {
            display: flex;
            gap: 12px;
            margin-top: 12px;
        }

        .employee-stat {
            font-size: 12px;
            color: var(--text-muted);
        }

        .employee-stat span {
            color: var(--text-primary);
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .empty-state-text {
            font-size: 14px;
        }

        /* 加载动画 */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 动画 */
        .fade-in {
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .header {
                padding: 16px 20px;
            }

            .main-container {
                padding: 20px;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .projects-grid {
                grid-template-columns: 1fr;
            }

            .progress-section {
                grid-template-columns: 1fr;
            }
        }

        /* 自定义滚动条 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--bg-card-hover);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">
            <div class="logo-icon">🚀</div>
            <div>
                <div class="logo-text">Nova Platform</div>
                <div class="logo-sub">智能团队看板</div>
            </div>
        </div>
        <div class="header-right">
            <div class="live-badge">
                <div class="live-dot"></div>
                <span>实时监控</span>
            </div>
            <button class="refresh-btn" onclick="loadData()">
                🔄 刷新数据
            </button>
        </div>
    </header>

    <main class="main-container">
        <!-- 统计卡片 -->
        <div id="stats" class="stats-grid">
            <div class="loading"><div class="loading-spinner"></div></div>
        </div>

        <!-- 项目列表 -->
        <h2 class="section-title">项目概览</h2>
        <div id="projects" class="projects-grid">
            <div class="loading"><div class="loading-spinner"></div></div>
        </div>

        <!-- 员工列表 -->
        <div class="employees-section">
            <h2 class="section-title">团队成员</h2>
            <div id="employees" class="employees-grid">
                <div class="loading"><div class="loading-spinner"></div></div>
            </div>
        </div>
    </main>

    <script>
        // 格式化数字
        function formatNumber(num) {
            if (num >= 1000) {
                return (num / 1000).toFixed(1) + 'k';
            }
            return num.toString();
        }

        // 获取状态显示
        function getStatusClass(status) {
            const map = {
                'planning': 'planning',
                'active': 'active',
                'completed': 'completed',
                'in_progress': '进行中',
                'pending': '待处理',
                'completed': '已完成'
            };
            return map[status] || status;
        }

        // 获取优先级样式
        function getPriorityClass(priority) {
            return priority || 'medium';
        }

        // 获取成员头像
        function getMemberAvatar(member) {
            const initial = member.name.charAt(0).toUpperCase();
            const typeClass = member.type === 'human' ? 'human' : 'ai';
            const icon = member.type === 'human' ? '👤' : '🤖';
            return `<div class="member-avatar ${typeClass}">${icon}</div>`;
        }

        // 获取员工头像
        function getEmployeeAvatar(emp) {
            const typeClass = emp.type === 'human' ? 'human' : 'ai';
            const icon = emp.type === 'human' ? '👤' : '🤖';
            return `<div class="employee-avatar ${typeClass}">${icon}</div>`;
        }

        // 获取任务图标
        function getTodoStatusIcon(status) {
            const map = {
                'pending': '⏳',
                'in_progress': '🔄',
                'completed': '✅'
            };
            return map[status] || '📋';
        }

        // 渲染统计卡片
        function renderStats(stats) {
            const container = document.getElementById('stats');
            container.innerHTML = `
                <div class="stat-card fade-in" style="animation-delay: 0ms">
                    <div class="stat-icon">📁</div>
                    <div class="stat-value">${stats.total_projects}</div>
                    <div class="stat-label">项目总数</div>
                </div>
                <div class="stat-card green fade-in" style="animation-delay: 100ms">
                    <div class="stat-icon">👥</div>
                    <div class="stat-value">${stats.total_employees}</div>
                    <div class="stat-label">团队成员</div>
                    <div class="progress-section">
                        <div class="progress-item">
                            <div class="progress-dot pending"></div>
                            <span class="progress-label">人类</span>
                            <span class="progress-value">${stats.total_employees - stats.ai_agents}</span>
                        </div>
                        <div class="progress-item">
                            <div class="progress-dot in-progress"></div>
                            <span class="progress-label">AI</span>
                            <span class="progress-value">${stats.ai_agents}</span>
                        </div>
                    </div>
                </div>
                <div class="stat-card amber fade-in" style="animation-delay: 200ms">
                    <div class="stat-icon">📋</div>
                    <div class="stat-value">${stats.total_todos}</div>
                    <div class="stat-label">任务总数</div>
                    <div class="progress-section">
                        <div class="progress-item">
                            <div class="progress-dot pending"></div>
                            <span class="progress-label">待处理</span>
                            <span class="progress-value">${stats.todos_pending}</span>
                        </div>
                        <div class="progress-item">
                            <div class="progress-dot in-progress"></div>
                            <span class="progress-label">进行中</span>
                            <span class="progress-value">${stats.todos_in_progress}</span>
                        </div>
                        <div class="progress-item">
                            <div class="progress-dot completed"></div>
                            <span class="progress-label">已完成</span>
                            <span class="progress-value">${stats.todos_completed}</span>
                        </div>
                    </div>
                </div>
                <div class="stat-card purple fade-in" style="animation-delay: 300ms">
                    <div class="stat-icon">🤖</div>
                    <div class="stat-value">${stats.ai_agents}</div>
                    <div class="stat-label">AI Agent</div>
                </div>
            `;
        }

        // 渲染项目卡片
        function renderProjects(projects) {
            const container = document.getElementById('projects');
            
            if (projects.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📂</div>
                        <div class="empty-state-text">暂无项目，创建一个开始吧</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = projects.map((proj, idx) => `
                <div class="project-card fade-in" style="animation-delay: ${idx * 100}ms">
                    <div class="project-header">
                        <div>
                            <div class="project-name">${proj.name}</div>
                            <div class="project-desc">${proj.description || '暂无描述'}</div>
                        </div>
                        <span class="project-status ${proj.status}">${getStatusClass(proj.status)}</span>
                    </div>
                    
                    <div class="project-progress">
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${proj.progress}%"></div>
                        </div>
                        <div class="progress-info">
                            <span>${proj.stats.completed}/${proj.stats.total} 任务已完成</span>
                            <span class="progress-percentage">${proj.progress}%</span>
                        </div>
                    </div>

                    <div class="project-stats">
                        <div class="project-stat">
                            <span class="project-stat-icon">⏳</span>
                            <span>待处理 ${proj.stats.pending}</span>
                        </div>
                        <div class="project-stat">
                            <span class="project-stat-icon">🔄</span>
                            <span>进行中 ${proj.stats.in_progress}</span>
                        </div>
                        <div class="project-stat">
                            <span class="project-stat-icon">✅</span>
                            <span>已完成 ${proj.stats.completed}</span>
                        </div>
                    </div>

                    <div class="project-members">
                        <span class="member-label">成员:</span>
                        ${proj.members.map(m => getMemberAvatar(m)).join('')}
                        ${proj.members.length === 0 ? '<span style="color: var(--text-muted); font-size: 12px;">暂无成员</span>' : ''}
                    </div>

                    ${proj.todos && proj.todos.length > 0 ? `
                        <div class="todo-section">
                            <div class="todo-header">
                                <span style="font-size: 12px; color: var(--text-muted);">最近任务</span>
                                <span class="todo-count">共 ${proj.todos.length} 个</span>
                            </div>
                            <div class="todo-list">
                                ${proj.todos.slice(0, 3).map(todo => `
                                    <div class="todo-item">
                                        <div class="todo-status ${todo.status}"></div>
                                        <span class="todo-title">${todo.title}</span>
                                        <span class="todo-priority ${getPriorityClass(todo.priority)}">${todo.priority}</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }

        // 渲染员工卡片
        function renderEmployees(employees) {
            const container = document.getElementById('employees');
            
            if (employees.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">👥</div>
                        <div class="empty-state-text">暂无团队成员</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = employees.map((emp, idx) => `
                <div class="employee-card fade-in" style="animation-delay: ${idx * 50}ms">
                    ${getEmployeeAvatar(emp)}
                    <div class="employee-info">
                        <div class="employee-name">${emp.name}</div>
                        <div class="employee-role">${emp.role || '通用成员'}</div>
                        <div class="employee-badge ${emp.type}">
                            ${emp.type === 'human' ? '👤 人类' : '🤖 AI Agent'}
                        </div>
                        <div class="employee-stats">
                            <div class="employee-stat">任务: <span>${emp.todo_count}</span></div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 加载所有数据
        async function loadData() {
            try {
                // 并行请求所有 API
                const [statsRes, projectsRes, employeesRes] = await Promise.all([
                    fetch('/api/stats'),
                    fetch('/api/projects'),
                    fetch('/api/employees')
                ]);

                const stats = await statsRes.json();
                const projects = await projectsRes.json();
                const employees = await employeesRes.json();

                renderStats(stats);
                renderProjects(projects);
                renderEmployees(employees);

            } catch (error) {
                console.error('加载数据失败:', error);
                document.getElementById('stats').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">❌</div>
                        <div class="empty-state-text">加载数据失败，请检查服务器</div>
                    </div>
                `;
            }
        }

        // 页面加载时自动获取数据
        document.addEventListener('DOMContentLoaded', loadData);

        // 每 30 秒自动刷新数据
        setInterval(loadData, 30000);
    </script>
</body>
</html>
